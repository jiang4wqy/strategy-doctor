services:
  - type: web
    name: strategy-doctor
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/v1/health
    envVars:
      - key: DOCTOR_HOST
        value: 0.0.0.0
      - key: DOCTOR_PORT
        value: 8080
      - key: DOCTOR_WEB_ACCESS_CODE
        sync: false
      - key: DOCTOR_SESSION_SECRET
        sync: false
      - key: DOCTOR_API_KEYS
        sync: false
      - key: DOCTOR_STATIC_ROOT
        value: web/dist

